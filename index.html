<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗号問題</title>
    <style>
        /* 画面全体を真っ白にし、要素を真ん中に集める */
        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            text-align: center;
        }

        /* コンテナの幅を設定 */
        .container {
            width: 90%;
            max-width: 500px;
        }

        /* 出題欄（テキストのみ） */
        .question-box {
            font-size: 1.2rem;
            color: #000000;
            line-height: 1.6;
            /* 出題欄と回答欄の間隔を少し広くあける */
            margin-bottom: 50px; 
        }

        /* 質素な回答欄（枠線だけのシンプルな箱） */
        input[type="text"] {
            width: 80%;
            padding: 8px;
            font-size: 1rem;
            border: 1px solid #000000;
            border-radius: 0; /* 角の丸みをなくして無機質に */
            outline: none;
            text-align: center; /* 入力する文字も中央揃え */
            margin-bottom: 20px;
        }

        /* 質素なボタン */
        button {
            display: block;
            margin: 0 auto;
            padding: 6px 20px;
            font-size: 0.9rem;
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #000000;
            cursor: pointer;
        }

        /* 結果表示テキスト */
        .result {
            margin-top: 30px;
            font-size: 1rem;
            min-height: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="question-box" id="question">
        ここに問題文が入ります
    </div>

    <input type="text" id="answerInput" placeholder="" autocomplete="off">
    <button onclick="checkAnswer()">回答</button>

    <div id="resultMessage" class="result"></div>
</div>

<script>
    // 【設定1】出題する問題文
    const questionText = "「たすけて」を1文字ずつ後ろにずらすと？ (例:あ→い)";
    
    // 【設定2】正解のハッシュ値 (現在は「ちせとぬ」の時の値です)
    const correctHash = "7bc3a9e62b080034a70cb653112be8f0412803b9b4bc063fbf71a53e34b9d073";

    // 画面に問題を表示
    document.getElementById("question").textContent = questionText;

    // 判定ロジック
    async function checkAnswer() {
        const userInput = document.getElementById("answerInput").value.trim();
        const resultMessage = document.getElementById("resultMessage");

        if (!userInput) {
            resultMessage.textContent = "";
            return;
        }

        // ユーザーの入力をハッシュ化
        const encoder = new TextEncoder();
        const data = encoder.encode(userInput);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const userHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        // 答え合わせ（結果もテキストだけでシンプルに表示）
        if (userHash === correctHash) {
            resultMessage.textContent = "正解";
            resultMessage.style.color = "#000000";
        } else {
            resultMessage.textContent = "不正解";
            resultMessage.style.color = "#000000";
        }
    }
</script>

</body>
</html>
